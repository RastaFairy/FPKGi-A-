name: 🐛 Bug Report
description: Reportar un error o comportamiento inesperado
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar un bug. Por favor completa la siguiente información.

  - type: input
    id: version
    attributes:
      label: Versión de FPKGi Manager
      placeholder: "ej: v5.11-FTP"
    validations:
      required: true

  - type: input
    id: android
    attributes:
      label: Versión de Android
      placeholder: "ej: Android 13 (API 33)"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Dispositivo
      placeholder: "ej: Samsung Galaxy S21"

  - type: textarea
    id: description
    attributes:
      label: Descripción del bug
      description: Describe claramente qué ocurrió
      placeholder: "Al intentar descargar un PKG via FTP..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Abre un JSON de catálogo
        2. Selecciona un juego
        3. Pulsa 'Descargar PKG'
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
      placeholder: "El PKG debería descargarse y enviarse al FTP..."
    validations:
      required: true

  - type: dropdown
    id: feature_affected
    attributes:
      label: Función afectada
      options:
        - Carga de JSON
        - Lista de juegos / búsqueda
        - Descarga FTP
        - Descarga local
        - OrbisPatches / parches
        - Configuración
        - Otro
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / capturas de pantalla
      description: Si tienes logs de Android (logcat) o capturas, añádelos aquí.
