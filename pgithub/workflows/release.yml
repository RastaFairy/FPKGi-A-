name: Release — Signed APK

on:
  push:
    tags:
      - 'v*.*'

jobs:
  release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build release APK
        env:
          SIGNING_KEY_ALIAS:    ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_FILE:   ${{ secrets.SIGNING_STORE_FILE }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          cp ${{steps.sign_app.outputs.signedReleaseFile}} \
             fpkgi-manager-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FPKGi Manager ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: fpkgi-manager-${{ github.ref_name }}.apk
          body: |
            ## FPKGi Manager ${{ github.ref_name }}

            ### Novedades
            - Descarga directa de PKGs a PS4 via FTP
            - Verificación de disponibilidad de PKGs
            - Consulta de parches en OrbisPatches
            - Soporte de formato FPKGi dict y PS4PKGInstaller list

            ### Requisitos
            - Android 10+ (API 29)
            - PS4 con servidor FTP activo (GoldHEN, PS4FTP, etc.)
            - Misma red WiFi que la PS4

            ### Instalación
            1. Descarga el APK
            2. Instala (puede requerir habilitar "Fuentes desconocidas")
            3. Abre un JSON de catálogo
            4. ¡A jugar! 🎮
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
